<div
  class="tw-fixed tw-left-0 tw-top-0 tw-p-3 tw-flex tw-flex-col tw-h-screen tw-bg-white tw-border-r tw-border-gray-200 tw-shadow-sm hover:tw-shadow-md tw-transition-shadow tw-duration-300"
>
  <div class="tw-pt-4 tw-flex tw-flex-col tw-gap-4 tw-items-center">
    <img
      width="50"
      class="tw-rounded-full tw-shadow-sm hover:tw-shadow-md tw-transition-all tw-duration-300 hover:tw-scale-105"
      src="pepe.png"
      alt="Meme Generator"
    />
    <div class="tw-flex tw-flex-col tw-gap-3">
      <p-button
        [style]="{ width: '70px' }"
        [link]="true"
        [routerLink]="''"
        [routerLinkActive]="'active-route'"
        [routerLinkActiveOptions]="{ exact: true }"
        severity="contrast"
        variant="outlined"
        label="New"
        icon="pi pi-file-plus"
        iconPos="top"
        class="sidebar-button"
      />
      <p-button
        [style]="{ width: '70px' }"
        [link]="true"
        [routerLink]="'my-memes'"
        [routerLinkActive]="'active-route'"
        [routerLinkActiveOptions]="{ exact: false }"
        severity="contrast"
        variant="outlined"
        label="My Memes"
        icon="pi pi-images"
        iconPos="top"
        class="sidebar-button"
      />
    </div>
  </div>
  @if (user) {
  <div class="tw-mt-auto tw-flex tw-flex-col tw-items-center">
    <div class="tw-text-center tw-text-xs tw-text-gray-500 tw-mb-2">
      <i class="pi pi-bolt"></i> {{ creditService.credits() ?? '...' }}
    </div>
    <p-avatar
      class="tw-mb-4 tw-cursor-pointer hover:tw-scale-105 tw-transition-transform tw-duration-300 tw-shadow-sm"
      (click)="menu.toggle($event)"
      size="large"
      [image]="user.pictureUrl"
      [label]="user.name?.at(0)"
      shape="circle"
    />
  </div>
  <p-menu #menu [model]="menuItems()" [popup]="true" />
  }
</div>
